name: Fetch market news

on:
  schedule:
    # 8:00 AM and 8:00 PM IST (UTC+5:30) → 02:30 and 14:30 UTC
    - cron: "30 2,14 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Fetch Zerodha news → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          india-market-news \
            --ticker-csv data/EQUITY_L.csv \
            --series EQ \
            --workers 20 \
            --micro-batch-size 20 \
            --micro-batch-pause 2 \
            --request-delay 0 \
            --batch-size 200 \
            --batch-pause 10
