name: Probe Zerodha rate limits

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Probe from GitHub Actions IP
        run: |
          python scripts/benchmark_rate_limit.py --count 40
