name: Probe Zerodha rate limits

on:
  workflow_dispatch:
    inputs:
      count:
        description: Number of tickers to probe
        default: "500"
        required: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Probe 20-at-a-time with 2s pause (GitHub Actions IP)
        run: |
          python scripts/probe_micro_batch.py \
            --count ${{ inputs.count || 500 }} \
            --workers 20 \
            --micro-batch-size 20 \
            --micro-batch-pause 2 \
            --request-delay 0
